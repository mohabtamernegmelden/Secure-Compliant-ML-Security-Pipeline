version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ml-security-pipeline-backend:latest
    container_name: ml_security_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development # Override to allow Swagger UI locally
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
