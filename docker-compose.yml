services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ml-security-pipeline-backend:latest
    container_name: ml_security_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - FRONTEND_URL=http://frontend
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - ml-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ml-security-pipeline-frontend:latest
    container_name: ml_security_frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=/api
      - REACT_APP_ENVIRONMENT=development
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
    depends_on:
      - backend
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    tmpfs:
      - /run

networks:
  ml-network:
    driver: bridge

